<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Admin — Testimonials</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Lora:wght@500;600&family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
  :root{
    --cream:#F1EEE7; --card:#FFFFFF; --ink:#33433E; --muted:#57645F;
    --sage:#7E9686; --sage-dark:#647B6C; --line:#D8D2C4; --gold:#B9895A;
    --red:#a34a3a; --red-bg:#f6e9e6;
  }
  *{margin:0;padding:0;box-sizing:border-box;}
  body{background:var(--cream); color:var(--ink); font-family:'Inter',sans-serif; min-height:100vh;}
  .wrap{max-width:920px; margin:0 auto; padding:40px 20px 80px;}
  h1{font-family:'Lora',serif; font-weight:600; font-size:26px; margin-bottom:26px;}
  h2{font-family:'Lora',serif; font-weight:600; font-size:18px; margin-bottom:14px;}

  /* Login */
  #loginBox{max-width:360px; margin:80px auto; background:#fff; padding:36px; border-radius:12px; border:1px solid var(--line); text-align:center;}
  #loginBox input{width:100%; padding:12px 14px; border:1px solid var(--line); border-radius:6px; font-size:14.5px; margin:16px 0; background:var(--cream);}
  #loginBox button{width:100%; background:var(--sage); color:#fff; border:none; padding:13px; border-radius:6px; font-weight:600; cursor:pointer;}
  #loginBox button:hover{background:var(--sage-dark);}
  #loginError{color:var(--red); font-size:13px; margin-top:8px;}

  /* Panel */
  .panel{display:none;}
  .card{background:#fff; border:1px solid var(--line); border-radius:10px; padding:26px; margin-bottom:26px;}
  .row{display:flex; gap:12px; flex-wrap:wrap;}
  .row input[type="text"]{flex:1; min-width:180px; padding:11px 13px; border:1px solid var(--line); border-radius:6px; font-size:14px; background:var(--cream);}
  .row button{background:var(--sage); color:#fff; border:none; padding:11px 20px; border-radius:6px; font-weight:600; cursor:pointer; white-space:nowrap;}
  .row button:hover{background:var(--sage-dark);}
  .link-output{margin-top:14px; display:none; background:var(--cream); border:1px dashed var(--line); border-radius:6px; padding:12px 14px; font-size:13.5px; word-break:break-all; justify-content:space-between; align-items:center; gap:10px;}
  .link-output button{background:var(--gold); flex-shrink:0;}

  .filters{display:flex; gap:8px; margin-bottom:18px;}
  .filters button{background:#fff; border:1px solid var(--line); color:var(--muted); padding:8px 16px; border-radius:20px; font-size:13px; font-weight:600; cursor:pointer;}
  .filters button.active{background:var(--sage); color:#fff; border-color:var(--sage);}

  .review-card{background:#fff; border:1px solid var(--line); border-radius:10px; padding:20px; margin-bottom:14px;}
  .review-top{display:flex; justify-content:space-between; align-items:flex-start; gap:10px; margin-bottom:10px;}
  .stars-display{color:var(--gold); font-size:16px; letter-spacing:2px;}
  .status-badge{font-size:11px; font-weight:700; padding:4px 10px; border-radius:20px; text-transform:uppercase; letter-spacing:0.4px;}
  .status-pending{background:#f4ecd8; color:#8a6a2f;}
  .status-approved{background:#e4ede6; color:var(--sage-dark);}
  .status-rejected{background:var(--red-bg); color:var(--red);}
  .review-text{font-size:14.5px; line-height:1.7; margin-bottom:12px;}
  .review-meta{font-size:12.5px; color:var(--muted); margin-bottom:14px;}
  .review-actions{display:flex; gap:8px;}
  .review-actions button{border:none; padding:8px 16px; border-radius:6px; font-size:13px; font-weight:600; cursor:pointer;}
  .btn-approve{background:var(--sage); color:#fff;}
  .btn-approve:hover{background:var(--sage-dark);}
  .btn-reject{background:#fff; color:var(--red); border:1px solid var(--red) !important;}
  .btn-delete{background:#fff; color:var(--muted); border:1px solid var(--line) !important;}
  .empty{text-align:center; color:var(--muted); padding:40px 0; font-size:14px;}
</style>
</head>
<body>

<div id="loginBox">
  <h1 style="margin-bottom:6px;">Admin Login</h1>
  <p style="color:var(--muted); font-size:13.5px;">Enter your admin password to continue.</p>
  <input type="password" id="passwordInput" placeholder="Password">
  <button onclick="login()">Login</button>
  <p id="loginError"></p>
</div>

<div class="wrap panel" id="panel">
  <h1>Testimonials Admin</h1>

  <div class="card">
    <h2>Generate a Unique Review Link</h2>
    <p style="color:var(--muted); font-size:13.5px; margin-bottom:14px;">Har customer ke liye ek naya link banao, phir use email/WhatsApp par bhej do. Har link sirf ek baar use ho sakta hai.</p>
    <div class="row">
      <input type="text" id="customerLabel" placeholder="Customer name or note (optional, sirf aapke reference ke liye)">
      <button onclick="generateLink()">Generate Link</button>
    </div>
    <div class="link-output" id="linkOutput">
      <span id="linkText"></span>
      <button onclick="copyLink()">Copy</button>
    </div>
  </div>

  <div class="card">
    <h2>Feedback</h2>
    <div class="filters">
      <button class="active" data-filter="all" onclick="setFilter('all')">All</button>
      <button data-filter="pending" onclick="setFilter('pending')">Pending</button>
      <button data-filter="approved" onclick="setFilter('approved')">Approved</button>
      <button data-filter="rejected" onclick="setFilter('rejected')">Rejected</button>
    </div>
    <div id="reviewList"><p class="empty">Loading…</p></div>
  </div>
</div>

<script>
  // 👇 Yahi Web app URL paste karo (index.html aur share-your-experience.html me jo diya hai wahi)
  var ENDPOINT_URL = "https://script.google.com/macros/s/AKfycbxS0R6qFl5KAok-Lo6Mrsz-AJMEwY1cMjN7D5xpo4IYmMLkVjQYa3hUekJqtRYGerrXNw/exec";

  var adminKey = '';
  var allReviews = [];
  var currentFilter = 'all';

  function login(){
    var pw = document.getElementById('passwordInput').value.trim();
    if(!pw){ return; }
    adminKey = pw;
    document.getElementById('loginError').textContent = '';
    fetchReviews(true);
  }

  function baseShareUrl(){
    // assumes share-your-experience.html sits in the same folder as this admin.html
    return window.location.href.replace(/admin\.html.*$/, 'share-your-experience.html');
  }

  function generateLink(){
    var randomId = 'r' + Date.now().toString(36) + Math.random().toString(36).slice(2,6);
    var link = baseShareUrl() + '?id=' + randomId;
    document.getElementById('linkText').textContent = link;
    document.getElementById('linkOutput').style.display = 'flex';
    document.getElementById('linkOutput').dataset.link = link;
  }

  function copyLink(){
    var link = document.getElementById('linkOutput').dataset.link;
    navigator.clipboard.writeText(link).then(function(){
      var btn = document.getElementById('linkOutput').querySelector('button');
      var old = btn.textContent;
      btn.textContent = 'Copied!';
      setTimeout(function(){ btn.textContent = old; }, 1500);
    });
  }

  function setFilter(f){
    currentFilter = f;
    document.querySelectorAll('.filters button').forEach(function(b){
      b.classList.toggle('active', b.getAttribute('data-filter') === f);
    });
    renderReviews();
  }

  function fetchReviews(isLoginAttempt){
    fetch(ENDPOINT_URL + '?action=list&key=' + encodeURIComponent(adminKey))
      .then(function(res){ return res.json(); })
      .then(function(data){
        if(data && data.error === 'unauthorized'){
          if(isLoginAttempt){
            document.getElementById('loginError').textContent = 'Incorrect password.';
          }
          return;
        }
        if(isLoginAttempt){
          document.getElementById('loginBox').style.display = 'none';
          document.getElementById('panel').style.display = 'block';
        }
        allReviews = data || [];
        renderReviews();
      })
      .catch(function(){
        if(isLoginAttempt){
          document.getElementById('loginError').textContent = 'Could not connect. Check the endpoint URL.';
        }
      });
  }

  function renderReviews(){
    var list = document.getElementById('reviewList');
    var filtered = allReviews.filter(function(r){
      if(currentFilter === 'all') return true;
      var s = (r.status || 'pending').toLowerCase() || 'pending';
      return s === currentFilter;
    });

    if(!filtered.length){
      list.innerHTML = '<p class="empty">No reviews here.</p>';
      return;
    }

    list.innerHTML = filtered.map(function(r){
      var status = (r.status || '').trim().toLowerCase() || 'pending';
      var statusClass = status === 'approved' ? 'status-approved' : (status === 'rejected' ? 'status-rejected' : 'status-pending');
      var displayName = r.anonymous ? 'Anonymous' : (r.name || 'Anonymous');
      var stars = '★★★★★☆☆☆☆☆'.slice(5 - r.rating, 10 - r.rating);
      return (
        '<div class="review-card">' +
          '<div class="review-top">' +
            '<div class="stars-display">' + stars + '</div>' +
            '<span class="status-badge ' + statusClass + '">' + status + '</span>' +
          '</div>' +
          '<p class="review-text">' + escapeHtml(r.quote) + '</p>' +
          '<p class="review-meta">' + escapeHtml(displayName) + (r.email ? ' · ' + escapeHtml(r.email) : '') + (r.timestamp ? ' · ' + escapeHtml(new Date(r.timestamp).toLocaleDateString()) : '') + '</p>' +
          '<div class="review-actions">' +
            '<button class="btn-approve" onclick="updateStatus(' + r.rowNumber + ', \'approve\')">Approve</button>' +
            '<button class="btn-reject" onclick="updateStatus(' + r.rowNumber + ', \'reject\')">Reject</button>' +
            '<button class="btn-delete" onclick="updateStatus(' + r.rowNumber + ', \'delete\')">Delete</button>' +
          '</div>' +
        '</div>'
      );
    }).join('');
  }

  function updateStatus(rowNumber, action){
    if(action === 'delete' && !confirm('Delete this review permanently?')) return;
    var payload = new URLSearchParams();
    payload.set('action', action);
    payload.set('key', adminKey);
    payload.set('rowNumber', rowNumber);
    fetch(ENDPOINT_URL, { method: 'POST', body: payload })
      .then(function(res){ return res.json(); })
      .then(function(){ fetchReviews(false); });
  }

  function escapeHtml(str){
    var div = document.createElement('div');
    div.textContent = str == null ? '' : String(str);
    return div.innerHTML;
  }
</script>
</body>
</html>
