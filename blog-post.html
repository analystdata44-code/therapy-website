<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Article — Healing Within</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Lora:ital,wght@0,400;0,500;0,600;0,700;1,400;1,500&family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
  :root{
    --cream:#F1EEE7; --cream-deep:#E9E4DA; --card:#FFFFFF; --ink:#33433E;
    --muted:#57645F; --sage:#7E9686; --sage-dark:#647B6C; --sage-soft:#AFC0B4;
    --line:#D8D2C4; --gold:#B9895A;
  }
  *{margin:0;padding:0;box-sizing:border-box;}
  body{background:var(--cream); color:var(--ink); font-family:'Inter',sans-serif; line-height:1.7;}

  .topbar{display:flex; align-items:center; justify-content:space-between; padding:26px 6vw; border-bottom:1px solid var(--line);}
  .logo{font-family:'Lora',serif; font-size:19px; font-weight:500; color:var(--ink); display:flex; align-items:center; gap:10px; text-decoration:none;}
  .back-link{font-size:13.5px; color:var(--sage-dark); font-weight:600; text-decoration:none; display:inline-flex; align-items:center; gap:6px;}
  .back-link:hover{text-decoration:underline;}

  .wrap{max-width:760px; margin:0 auto; padding:60px 6vw 100px;}

  .meta-row{display:flex; align-items:center; gap:14px; font-size:12.5px; color:var(--muted); text-transform:uppercase; letter-spacing:0.06em; margin-bottom:22px; flex-wrap:wrap;}
  .cat-badge{background:var(--sage); color:#fff; padding:5px 13px; border-radius:20px; font-weight:600; letter-spacing:0.04em;}

  h1.article-title{
    font-family:'Inter',sans-serif; font-weight:700; font-size:clamp(24px,3.4vw,38px);
    letter-spacing:0.09em; text-transform:uppercase; line-height:1.4; color:var(--ink);
    margin-bottom:36px;
  }

  .hero-image{width:100%; border-radius:14px; overflow:hidden; margin-bottom:40px; background:var(--cream-deep);}
  .hero-image img{width:100%; display:block; object-fit:cover; max-height:520px;}

  .article-body p{font-size:16px; color:var(--ink); margin-bottom:22px;}
  .article-body p strong{color:var(--sage-dark);}
  .article-body p em{color:var(--sage-dark); font-style:italic;}

  .article-body h2{
    font-family:'Lora',serif; font-weight:600; font-size:26px; color:var(--sage-dark);
    margin:44px 0 18px; line-height:1.35;
  }
  .article-body h3{
    font-family:'Lora',serif; font-weight:600; font-size:20px; color:var(--sage-dark);
    margin:32px 0 14px; line-height:1.35;
  }
  .article-body u{text-decoration:underline;}
  .article-body s{text-decoration:line-through;}
  .article-body sub{font-size:75%;}
  .article-body sup{font-size:75%;}
  .article-body a{color:var(--sage-dark); text-decoration:underline;}
  .article-body blockquote{
    border-left:3px solid var(--sage); margin:28px 0; padding:6px 0 6px 20px;
    font-style:italic; color:var(--muted);
  }
  .article-body ol{margin:0 0 24px 22px;}
  .article-body ol li{font-size:16px; color:var(--ink); margin-bottom:10px;}
  .article-body .ql-align-center{text-align:center;}
  .article-body .ql-align-right{text-align:right;}
  .article-body .ql-align-justify{text-align:justify;}
  .article-body .ql-indent-1{padding-left:2em;}
  .article-body .ql-indent-2{padding-left:4em;}
  .extra-gallery{display:grid; grid-template-columns:1fr 1fr; gap:16px; margin-top:20px;}
  @media (max-width:560px){ .extra-gallery{grid-template-columns:1fr;} }

  .article-body ul{margin:0 0 24px 22px;}
  .article-body ul li{font-size:16px; color:var(--ink); margin-bottom:10px;}

  .inline-image{margin:36px 0; border-radius:12px; overflow:hidden; background:var(--cream-deep);}
  .inline-image img{width:100%; display:block;}
  .inline-image figcaption{font-size:12.5px; color:var(--muted); text-align:center; margin-top:10px; font-style:italic;}

  .footer-nav{margin-top:70px; padding-top:30px; border-top:1px solid var(--line); text-align:center;}
  .footer-nav a{color:var(--sage-dark); font-weight:600; text-decoration:none; font-size:14px;}
  .footer-nav a:hover{text-decoration:underline;}

  .state-box{text-align:center; padding:120px 20px; color:var(--muted);}
  .hidden{display:none !important;}
</style>
</head>
<body>

<div class="topbar">
  <a class="logo" href="index.html">Healing Within</a>
  <a class="back-link" href="index.html#yellow-chair">&larr; Back to Blog</a>
</div>

<div class="wrap">
  <div id="loadingState" class="state-box">Loading article…</div>
  <div id="notFoundState" class="state-box hidden">This article could not be found, or is not yet published.</div>

  <div id="articleState" class="hidden">
    <div class="meta-row">
      <span class="cat-badge" id="articleCategory"></span>
      <span id="articleDate"></span>
    </div>
    <h1 class="article-title" id="articleTitle"></h1>
    <div class="hero-image hidden" id="heroImageWrap">
      <img id="heroImage" src="" alt="">
    </div>
    <div class="article-body" id="articleBody"></div>

    <div class="footer-nav">
      <a href="index.html#yellow-chair">&larr; Back to all articles</a>
    </div>
  </div>
</div>

<script src="config.js"></script>
<script>
(function(){
  // Script URL config.js se aata hai (TESTIMONIALS_SCRIPT_URL) — ek hi jagah set karna hai
  var ENDPOINT_URL = (typeof TESTIMONIALS_SCRIPT_URL !== 'undefined') ? TESTIMONIALS_SCRIPT_URL : "PASTE_YOUR_TESTIMONIALS_APPS_SCRIPT_URL_HERE";

  var params = new URLSearchParams(window.location.search);
  var postId = params.get('id') || '';
  var adminKey = params.get('key') || ''; // agar admin panel se "Preview" khola gaya ho (drafts bhi dikhega)

  var loadingState = document.getElementById('loadingState');
  var notFoundState = document.getElementById('notFoundState');
  var articleState = document.getElementById('articleState');

  function escapeHtml(str){
    var div = document.createElement('div');
    div.textContent = str == null ? '' : String(str);
    return div.innerHTML;
  }

  // Turn **bold** and *italic* into <strong>/<em> inside a line of text (after escaping)
  function inlineFormat(escapedText){
    return escapedText
      .replace(/\*\*(.+?)\*\*/g, '<strong>$1</strong>')
      .replace(/\*(.+?)\*/g, '<em>$1</em>');
  }

  // Content saved by the new rich text editor is already HTML (starts with a tag
  // like "<p>" or "<h2>"). Older posts were saved as plain text with "## Heading"
  // lines, blank-line paragraphs, and "- item" lists — that legacy format is
  // still supported below so old posts keep working.
  function renderContent(content, extraImages){
    if(/^\s*</.test(content)){
      var extraGallery = '';
      if(extraImages && extraImages.length > 1){
        extraGallery = '<div class="extra-gallery">' + extraImages.slice(1).map(function(url){
          return '<figure class="inline-image"><img src="' + escapeHtml(url) + '" alt=""></figure>';
        }).join('') + '</div>';
      }
      return content + extraGallery;
    }

    var blocks = content.split(/\n\s*\n/);
    var html = '';
    var imgPointer = 0; // extraImages[0] is used as the hero image already, so start from 1
    var paraCount = 0;

    blocks.forEach(function(block){
      var trimmed = block.trim();
      if(!trimmed) return;

      if(/^##\s+/.test(trimmed)){
        html += '<h2>' + inlineFormat(escapeHtml(trimmed.replace(/^##\s+/, ''))) + '</h2>';
        return;
      }

      var lines = trimmed.split('\n').map(function(l){ return l.trim(); }).filter(Boolean);
      var isList = lines.length > 0 && lines.every(function(l){ return /^[-*]\s+/.test(l); });

      if(isList){
        html += '<ul>' + lines.map(function(l){
          return '<li>' + inlineFormat(escapeHtml(l.replace(/^[-*]\s+/, ''))) + '</li>';
        }).join('') + '</ul>';
        return;
      }

      html += '<p>' + inlineFormat(escapeHtml(trimmed)).replace(/\n/g, '<br>') + '</p>';
      paraCount++;

      // Sprinkle in any additional uploaded images every ~3 paragraphs
      if(extraImages && extraImages.length > (imgPointer + 1) && paraCount % 3 === 0){
        imgPointer++;
        html += '<figure class="inline-image"><img src="' + escapeHtml(extraImages[imgPointer]) + '" alt=""></figure>';
      }
    });

    return html;
  }

  function showArticle(post){
    document.getElementById('articleCategory').textContent = post.category || 'Article';
    var dateStr = '';
    if(post.createdAt){
      var d = new Date(post.createdAt);
      if(!isNaN(d)) dateStr = d.toLocaleDateString(undefined, { year:'numeric', month:'long', day:'numeric' });
    }
    document.getElementById('articleDate').textContent = dateStr;
    document.getElementById('articleTitle').textContent = post.title || '';

    if(post.images && post.images.length){
      document.getElementById('heroImage').src = post.images[0];
      document.getElementById('heroImageWrap').classList.remove('hidden');
    }

    document.getElementById('articleBody').innerHTML = renderContent(post.content || '', post.images || []);

    loadingState.classList.add('hidden');
    articleState.classList.remove('hidden');
    document.title = (post.title || 'Article') + ' — Healing Within';
  }

  if(!ENDPOINT_URL || ENDPOINT_URL.indexOf('PASTE_YOUR') === 0){
    loadingState.textContent = 'Backend not connected yet — see Testimonials_Backend_Code.gs setup instructions.';
    return;
  }
  if(!postId){
    loadingState.classList.add('hidden');
    notFoundState.classList.remove('hidden');
    return;
  }

  var action = adminKey ? 'adminBlogs' : 'blogs';
  var url = ENDPOINT_URL + '?action=' + action + (adminKey ? '&key=' + encodeURIComponent(adminKey) : '') + '&_=' + Date.now();

  fetch(url, { cache: 'no-store' })
    .then(function(res){ return res.json(); })
    .then(function(data){
      if(!Array.isArray(data)){
        loadingState.classList.add('hidden');
        notFoundState.classList.remove('hidden');
        return;
      }
      var post = data.find(function(b){ return String(b.id) === String(postId); });
      if(!post){
        loadingState.classList.add('hidden');
        notFoundState.classList.remove('hidden');
        return;
      }
      showArticle(post);
    })
    .catch(function(){
      loadingState.classList.add('hidden');
      notFoundState.classList.remove('hidden');
    });
})();
</script>
</body>
</html>
