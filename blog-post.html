<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Blog</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Lora:wght@500;600&family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
  :root{
    --cream: #F1EEE7;
    --cream-deep: #E9E4DA;
    --card: #FFFFFF;
    --ink: #33433E;
    --muted: #57645F;
    --sage: #7E9686;
    --sage-dark: #647B6C;
    --sage-soft: #AFC0B4;
    --line: #D8D2C4;
    --gold: #B9895A;
  }
  *{margin:0;padding:0;box-sizing:border-box;}
  html{scroll-behavior:smooth;}
  body{background:var(--cream); color:var(--ink); font-family:'Inter',sans-serif; -webkit-font-smoothing:antialiased;}

  .topbar{
    background:var(--cream); border-bottom:1px solid var(--line);
    padding:18px 24px; display:flex; align-items:center; justify-content:space-between;
  }
  .topbar-back{
    font-size:13.5px; font-weight:600; color:var(--sage-dark); text-decoration:none;
    display:inline-flex; align-items:center; gap:6px;
  }
  .topbar-back:hover{color:var(--ink);}

  .wrap{max-width:720px; margin:0 auto; padding:50px 24px 90px;}

  .post-eyebrow{font-size:12px; letter-spacing:.14em; text-transform:uppercase; color:var(--sage-dark); font-weight:700; margin-bottom:14px;}
  .post-title{font-family:'Lora',serif; font-weight:600; font-size:clamp(28px,4.4vw,42px); line-height:1.25; color:var(--ink); margin-bottom:18px;}
  .post-meta{display:flex; align-items:center; gap:16px; font-size:13px; color:var(--muted); margin-bottom:32px; flex-wrap:wrap;}
  .post-meta span{display:inline-flex; align-items:center; gap:6px;}

  .post-hero{width:100%; max-height:420px; object-fit:cover; border-radius:14px; margin-bottom:36px; display:block;}

  .post-body{font-size:16px; line-height:1.9; color:#3d4a45;}
  .post-body p{margin-bottom:22px;}
  .post-body h2{
    font-family:'Lora',serif; font-weight:600; font-size:clamp(21px,2.6vw,26px); color:var(--ink);
    margin:44px 0 18px; line-height:1.35;
  }

  .post-gallery{display:flex; gap:12px; overflow-x:auto; margin:36px 0; padding-bottom:6px;}
  .post-gallery img{width:220px; height:150px; object-fit:cover; border-radius:10px; flex-shrink:0;}

  .post-footer{margin-top:56px; padding-top:28px; border-top:1px solid var(--line); text-align:center;}
  .post-footer a{
    display:inline-flex; align-items:center; gap:8px; background:var(--sage); color:#fff;
    text-decoration:none; padding:13px 28px; border-radius:8px; font-weight:600; font-size:14px;
  }
  .post-footer a:hover{background:var(--sage-dark);}

  .post-loading, .post-error{text-align:center; color:var(--muted); font-size:14.5px; padding:80px 0;}

  @media (max-width:560px){
    .wrap{padding:34px 18px 60px;}
    .post-hero{max-height:260px;}
  }
</style>
</head>
<body>

<div class="topbar">
  <a class="topbar-back" href="index.html#yellow-chair">← Back to Blog</a>
</div>

<div class="wrap">
  <div id="postLoading" class="post-loading">Loading…</div>
  <div id="postContent" style="display:none;">
    <div class="post-eyebrow" id="postCategory"></div>
    <h1 class="post-title" id="postTitle"></h1>
    <div class="post-meta">
      <span id="postDate"></span>
      <span id="postReadTime"></span>
    </div>
    <img class="post-hero" id="postHero" style="display:none;">
    <div class="post-body" id="postBody"></div>
    <div class="post-gallery" id="postGallery" style="display:none;"></div>
    <div class="post-footer">
      <a href="index.html#yellow-chair">← Back to all articles</a>
    </div>
  </div>
</div>

<script src="config.js"></script>
<script>
  (function(){
    var ENDPOINT_URL = (typeof TESTIMONIALS_SCRIPT_URL !== 'undefined') ? TESTIMONIALS_SCRIPT_URL : "PASTE_YOUR_TESTIMONIALS_APPS_SCRIPT_URL_HERE";

    function escapeHtml(str){
      var div = document.createElement('div');
      div.textContent = str == null ? '' : String(str);
      return div.innerHTML;
    }

    function formatDate(iso){
      if(!iso) return '';
      var d = new Date(iso);
      if(isNaN(d.getTime())) return '';
      return d.toLocaleDateString('en-IN', { year:'numeric', month:'long', day:'numeric' });
    }

    function readTime(text){
      var words = String(text || '').trim().split(/\s+/).filter(Boolean).length;
      var minutes = Math.max(1, Math.round(words / 200));
      return minutes + ' min read';
    }

    // Turns plain text into HTML with heading support:
    //  - a line starting with "## " becomes a section heading
    //  - a blank line separates paragraphs
    //  - single line breaks inside a paragraph become <br>
    function renderContent(text){
      var blocks = String(text || '').split(/\n\s*\n/);
      return blocks.map(function(block){
        var trimmed = block.trim();
        if(!trimmed) return '';
        if(/^##\s+/.test(trimmed)){
          return '<h2>' + escapeHtml(trimmed.replace(/^##\s+/, '')) + '</h2>';
        }
        return '<p>' + escapeHtml(trimmed).replace(/\n/g, '<br>') + '</p>';
      }).join('');
    }

    function showError(message){
      document.getElementById('postLoading').textContent = message;
    }

    var params = new URLSearchParams(window.location.search);
    var postId = params.get('id');

    if(!postId){
      showError('No blog post was specified.');
      return;
    }
    if(!ENDPOINT_URL || ENDPOINT_URL.indexOf('PASTE_YOUR') === 0){
      showError('Blog backend not connected yet.');
      return;
    }

    fetch(ENDPOINT_URL + '?action=blogs')
      .then(function(res){ return res.json(); })
      .then(function(data){
        var post = (data || []).find(function(b){ return b.id === postId; });
        if(!post){
          showError('This blog post could not be found.');
          return;
        }

        document.title = post.title + ' — Blog';
        if(post.category) document.getElementById('postCategory').textContent = post.category;
        document.getElementById('postTitle').textContent = post.title;
        document.getElementById('postDate').innerHTML = '📅 ' + escapeHtml(formatDate(post.createdAt));
        document.getElementById('postReadTime').innerHTML = '⏱ ' + readTime(post.content);
        document.getElementById('postBody').innerHTML = renderContent(post.content);

        var images = post.images || [];
        if(images.length){
          var hero = document.getElementById('postHero');
          hero.src = images[0];
          hero.style.display = 'block';
        }
        if(images.length > 1){
          var galleryEl = document.getElementById('postGallery');
          galleryEl.innerHTML = images.slice(1).map(function(url){
            return '<img src="' + escapeHtml(url) + '" alt="">';
          }).join('');
          galleryEl.style.display = 'flex';
        }

        document.getElementById('postLoading').style.display = 'none';
        document.getElementById('postContent').style.display = 'block';
      })
      .catch(function(){
        showError('Could not load this blog post right now.');
      });
  })();
</script>
</body>
</html>
